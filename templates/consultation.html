{% extends "base.html" %}

{% block title %}Консультація{% endblock %}

{% block content %}
<h2 class="mb-4">Замовити консультацію</h2>

<form method="post">
    <div class="mb-3">
        <label class="form-label">Імʼя</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Контактні дані (email / телефон)</label>
        <input type="text" name="contact" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Повідомлення</label>
        <textarea name="message" class="form-control" rows="4" required></textarea>
    </div>

    <button class="btn btn-dark">Надіслати</button>
</form>
{% endblock %}
